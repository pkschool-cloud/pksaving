<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบออมทรัพย์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #f0fdf4; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] relative">
    
    <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>

    <div class="glass-panel w-full max-w-md p-10 rounded-[2rem] shadow-2xl animate__animated animate__fadeInUp">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 animate__animated animate__bounceIn">
                <i class="fas fa-piggy-bank text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">ระบบออมทรัพย์</h1>
            <p class="text-gray-500">ลงชื่อเข้าใช้งานสำหรับเจ้าหน้าที่</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm text-gray-500 mb-1 ml-1">ชื่อผู้ใช้งาน</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-emerald-500"></i>
                    <input type="text" id="username" class="w-full pl-12 p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-400 transition-all" required>
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-500 mb-1 ml-1">รหัสผ่าน</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-emerald-500"></i>
                    <input type="password" id="password" class="w-full pl-12 p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-400 transition-all" required>
                </div>
            </div>
            <button type="submit" id="btnSubmit" class="w-full py-4 mt-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg hover:bg-emerald-700 active:scale-95 transition-all">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script>
        // *** ลบลิงก์นี้ออก แล้วเอา URL ที่ได้จาก Google Apps Script (ลงท้ายด้วย /exec) มาใส่แทนที่ในเครื่องหมายคำพูดครับ ***
        const API_URL = "https://script.google.com/macros/s/AKfycbwr7gAzrI3dJxOl10XFq6eznUVQDEl6ZT6rvTygTDd9A6JvnkovOk7RpwP7Jq11RLZZlA/exec";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...';
            btn.disabled = true;

            try {
                // โค้ดส่วนนี้คือของจริงที่เชื่อมต่อกับ Google Sheet แล้วครับ
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username: user, password: pass })
                });
                
                const result = await response.json();

                if(result.status === "success") {
                    localStorage.setItem('userName', result.name); // เก็บชื่อผู้ใช้ไว้แสดงหน้า Dashboard
                    window.location.href = "dashboard.html"; // กระโดดไปหน้า Dashboard
                } else {
                    alert(result.message || "ข้อมูลไม่ถูกต้อง กรุณาลองใหม่");
                    btn.innerHTML = 'เข้าสู่ระบบ';
                    btn.disabled = false;
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาตรวจสอบลิงก์ API_URL หรือการตั้งค่า Google Sheet");
                console.error(err);
                btn.innerHTML = 'เข้าสู่ระบบ';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
