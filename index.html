<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบออมทรัพย์โรงเรียนป่าก้าง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #064e3b; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); }
        .input-focus { transition: all 0.3s; border: 2px solid transparent; }
        .input-focus:focus { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .coin-anim { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="h-screen flex items-center justify-center relative px-4">
    
    <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/leaf.png')]"></div>

    <div class="glass-panel w-full max-w-md p-10 rounded-[3rem] shadow-2xl z-10 animate__animated animate__zoomIn text-center">
        <div class="mb-8 coin-anim">
            <i class="fas fa-piggy-bank text-8xl text-emerald-600"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">ยินดีต้อนรับ</h1>
        <p class="text-gray-500 mb-8 text-lg">ระบบออมทรัพย์โรงเรียนป่าก้าง</p>
        
        <form id="loginForm" class="space-y-6 text-left">
            <div class="relative">
                <i class="fas fa-user absolute left-5 top-5 text-gray-400"></i>
                <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" class="w-full pl-14 p-5 bg-gray-50 rounded-2xl outline-none input-focus text-lg" required>
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-5 top-5 text-gray-400"></i>
                <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full pl-14 p-5 bg-gray-50 rounded-2xl outline-none input-focus text-lg" required>
            </div>
            <button type="submit" id="btnSubmit" class="w-full py-5 bg-emerald-500 text-white rounded-2xl text-xl font-bold hover:bg-emerald-600 shadow-xl shadow-emerald-900/20 transform active:scale-95 transition-all flex justify-center items-center">
                เข้าสู่ระบบ <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>
        <p class="mt-8 text-gray-400 text-sm italic">"ออมวันนี้ เพื่ออนาคตที่สดใสของเด็กไทย"</p>
    </div>

    <div id="errorToast" class="fixed top-8 left-1/2 transform -translate-x-1/2 z-50 bg-red-500 text-white px-8 py-4 rounded-full shadow-2xl font-bold hidden items-center gap-3 animate__animated animate__fadeInDown">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMsg">เกิดข้อผิดพลาด</span>
    </div>

    <script>
        // ลิงก์ API ล่าสุดที่คุณวู้ดดี้ให้มา
        const API_URL = "function doPost(e) {
  // ตั้งค่า CORS Header ให้เว็บอื่นเรียกใช้งานได้
  var headers = {
    "Access-Control-Allow-Origin": "*",
    "Access-Control-Allow-Methods": "POST, GET, OPTIONS"
  };

  try {
    var data = JSON.parse(e.postData.contents);
    var action = data.action;
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var result = {};

    // ==========================================
    // 1. ฟังก์ชันเข้าสู่ระบบ (Login)
    // ==========================================
    if (action === "login") {
      var sheetUsers = ss.getSheetByName("Users");
      var usersData = sheetUsers.getDataRange().getValues();
      var isLoginSuccess = false;

      for (var i = 1; i < usersData.length; i++) {
        if (usersData[i][0].toString().trim() === data.username.toString().trim() && 
            usersData[i][1].toString().trim() === data.password.toString().trim()) {
          result = { 
            status: "success", 
            name: usersData[i][2], // ชื่อครู
            role: usersData[i][3]  // ระดับชั้นที่ดูแล
          };
          isLoginSuccess = true;
          break;
        }
      }
      if (!isLoginSuccess) result = { status: "error", message: "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง" };
    }

    // ==========================================
    // 2. ดึงข้อมูลนักเรียน 1 คน (สแกนรหัส)
    // ==========================================
    else if (action === "getStudent") {
      var sheetStudents = ss.getSheetByName("Students");
      var studentsData = sheetStudents.getDataRange().getValues();
      var studentFound = false;

      for (var i = 1; i < studentsData.length; i++) {
        if (studentsData[i][0].toString().trim() === data.id.toString().trim()) {
          result = { 
            status: "success", 
            data: { id: studentsData[i][0], name: studentsData[i][1], balance: Number(studentsData[i][2]) } 
          };
          studentFound = true;
          break;
        }
      }
      if (!studentFound) result = { status: "error", message: "ไม่พบข้อมูลนักเรียนรหัสนี้" };
    }

    // ==========================================
    // 3. ดึงนักเรียนทั้งห้อง (สำหรับหักรายกลุ่ม)
    // ==========================================
    else if (action === "getStudents") {
      var studentsData = ss.getSheetByName("Students").getDataRange().getValues();
      var list = [];
      for (var i = 1; i < studentsData.length; i++) {
        // ดึงเฉพาะเด็กที่อยู่ห้องเดียวกับที่ครูรับผิดชอบ
        if (studentsData[i][3] == data.classLevel) {
          list.push({ id: studentsData[i][0], name: studentsData[i][1], balance: Number(studentsData[i][2]) });
        }
      }
      result = { status: "success", data: list };
    }

    // ==========================================
    // 4. บันทึก ฝาก/หัก/ย้อนหลัง (รายคน)
    // ==========================================
    else if (action === "transaction") {
      var sheetStudents = ss.getSheetByName("Students");
      var sheetTrans = ss.getSheetByName("Transactions");
      var studentsData = sheetStudents.getDataRange().getValues();
      var updateSuccess = false;

      for (var i = 1; i < studentsData.length; i++) {
        if (studentsData[i][0].toString() === data.studentId.toString()) {
          var currentBal = Number(studentsData[i][2]) || 0;
          var amount = Number(data.amount);
          var newBal = data.type === 'save' ? currentBal + amount : currentBal - amount;

          // อัปเดตยอดคงเหลือ
          sheetStudents.getRange(i + 1, 3).setValue(newBal);
          
          // บันทึกประวัติ
          sheetTrans.appendRow([
            data.date || new Date(), 
            data.studentId, 
            data.type === 'save' ? 'ฝากเงิน' : 'หักเงิน', 
            amount, 
            data.note || "-", 
            data.adminName || "System"
          ]);

          result = { status: "success", newBalance: newBal, message: "ทำรายการสำเร็จ" };
          updateSuccess = true;
          break;
        }
      }
      if (!updateSuccess) result = { status: "error", message: "เกิดข้อผิดพลาด ไม่สามารถอัปเดตยอดเงินได้" };
    }

    // ==========================================
    // 5. บันทึก หักเงิน (รายกลุ่ม หลายคนพร้อมกัน)
    // ==========================================
    else if (action === "transactionGroup") {
      var sheetStudents = ss.getSheetByName("Students");
      var sheetTrans = ss.getSheetByName("Transactions");
      var studentsData = sheetStudents.getDataRange().getValues();
      var ids = data.studentIds; // Array รหัสนักเรียนที่ถูกเลือก
      var amount = Number(data.amount);

      for (var j = 0; j < ids.length; j++) {
        for (var i = 1; i < studentsData.length; i++) {
          if (studentsData[i][0].toString() === ids[j].toString()) {
            var currentBal = Number(studentsData[i][2]) || 0;
            var newBal = currentBal - amount;
            
            sheetStudents.getRange(i + 1, 3).setValue(newBal);
            sheetTrans.appendRow([data.date || new Date(), ids[j], 'หักเงิน', amount, data.note || "-", data.adminName || "System"]);
            break;
          }
        }
      }
      result = { status: "success", message: "หักเงินรายกลุ่มสำเร็จ" };
    }

    // ==========================================
    // 6. ดึงประวัติย้อนหลัง (หน้ารายการแก้ไข)
    // ==========================================
    else if (action === "getTransactions") {
      var transData = ss.getSheetByName("Transactions").getDataRange().getValues();
      var list = [];
      // ดึงย้อนหลัง 50 รายการล่าสุด
      for (var i = transData.length - 1; i >= 1 && list.length < 50; i--) {
        list.push({
          row: i + 1, // เก็บเลขแถวไว้เพื่อใช้ตอนกดลบ
          date: transData[i][0],
          studentId: transData[i][1],
          type: transData[i][2],
          amount: transData[i][3],
          note: transData[i][4]
        });
      }
      result = { status: "success", data: list };
    }

    // ==========================================
    // 7. ลบรายการที่ผิดพลาด และคืนยอดเงิน
    // ==========================================
    else if (action === "deleteTransaction") {
      var sheetTrans = ss.getSheetByName("Transactions");
      var sheetStudents = ss.getSheetByName("Students");
      
      // ดึงข้อมูลรายการที่จะลบเพื่อไปคำนวณเงินคืน
      var rowData = sheetTrans.getRange(data.row, 1, 1, 4).getValues()[0];
      var stuId = rowData[1];
      var type = rowData[2];
      var amount = Number(rowData[3]);
      
      // คืนยอดเงินในหน้า Students
      var studentsData = sheetStudents.getDataRange().getValues();
      for (var i = 1; i < studentsData.length; i++) {
        if (studentsData[i][0].toString() === stuId.toString()) {
          var currentBal = Number(studentsData[i][2]);
          // ถ้าเคยฝาก ให้หักออก, ถ้าเคยหัก ให้บวกกลับ
          var newBal = (type === 'ฝากเงิน') ? currentBal - amount : currentBal + amount;
          sheetStudents.getRange(i + 1, 3).setValue(newBal);
          break;
        }
      }
      
      // ลบแถวทิ้ง
      sheetTrans.deleteRow(data.row);
      result = { status: "success", message: "ลบรายการและคืนยอดเงินเรียบร้อย" };
    }

    // ส่งข้อมูลกลับไปให้หน้าเว็บ
    return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);

  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({status: "error", message: error.message})).setMimeType(ContentService.MimeType.JSON);
  }
}

// ฟังก์ชันรองรับการเช็คสิทธิ์ (Preflight Request)
function doOptions(e) { 
  return ContentService.createTextOutput("").setMimeType(ContentService.MimeType.TEXT); 
}";

        function showError(msg) {
            const toast = document.getElementById('errorToast');
            document.getElementById('errorMsg').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';
            btn.disabled = true;

            try {
                // อัปเกรด Fetch API ให้รองรับ Google Apps Script ได้สมบูรณ์ 100%
                const response = await fetch(API_URL, {
                    method: 'POST',
                    redirect: 'follow', // จำเป็นมากสำหรับ Google Script
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8", // บังคับให้ข้ามการตรวจสอบ CORS
                    },
                    body: JSON.stringify({ action: 'login', username: user, password: pass })
                });
                
                const result = await response.json();

                if(result.status === "success") {
                    // ส่งตัวแปร 2 ตัวให้หน้า Dashboard (ชื่อ กับ ระดับชั้น)
                    localStorage.setItem('adminName', result.name); 
                    localStorage.setItem('adminClass', result.role); 
                    window.location.href = "dashboard.html"; 
                } else {
                    showError(result.message || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                    btn.innerHTML = 'เข้าสู่ระบบ <i class="fas fa-arrow-right ml-2"></i>';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showError("เชื่อมต่อไม่สำเร็จ! กรุณาเช็คว่า Deploy สิทธิ์เป็น 'Anyone' หรือยัง");
                btn.innerHTML = 'เข้าสู่ระบบ <i class="fas fa-arrow-right ml-2"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
