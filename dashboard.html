<script>
        // 🌟 วางลิงก์ที่ได้จากการ Deploy รอบล่าสุดตรงนี้ครับ!
        const API_URL = "https://script.google.com/macros/s/AKfycbwd1hpc1Fc3t82YNeD2UcHQeVWKfHgwF89rCq4LkxhGQzNjOTA1tFIzy9MTLv-3D_APMA/exec";

        const { createApp } = Vue;
        createApp({
            data() {
                const ac = localStorage.getItem('adminClass') || 'ป.1';
                return {
                    view: 'save',
                    adminName: localStorage.getItem('adminName') || 'คุณครู',
                    adminClass: ac, 
                    selectedClass: ac === 'Admin' ? 'ทั้งหมด' : ac,
                    showProfileMenu: false,
                    toast: { show: false, msg: '', type: 'success' },
                    
                    // สำหรับฟังก์ชัน สะสมทรัพย์
                    saveId: '', saveInfo: null, saveAmount: null, loadingSave: false, showSaveAnim: false, loadingSearch: false, lastSlip: null, searchTimeout: null, 
                    
                    // สำหรับฟังก์ชัน หักลบกลบหนี้
                    deductMode: 'single', transDate: new Date().toISOString().slice(0,10), transNote: '', deductId: '', deductAmount: null, selectedStudents: [], students: [], loadingDeduct: false,
                    
                    // สำหรับฟังก์ชัน เงินฉันมีเท่าไหร่
                    myMoneyId: '', myMoneyInfo: null,
                    
                    // สำหรับฟังก์ชัน จัดการข้อมูล
                    manageDate: new Date().toISOString().slice(0,10), manageId: '', manageType: 'save', manageAmount: null, manageNote: '', loadingManage: false, transHistory: [], loadingHistory: false, autoRefreshTimer: null,
                    
                    // 🌟 ตัวแปรสำหรับรายงาน Custom PDF
                    printOrientation: 'portrait', 
                    reportTimeRange: 'today', 
                    reportTargetMode: 'all', 
                    reportTargetId: '',
                    reportData: { history: [], summary: { save: 0, deduct: 0, net: 0, totalBalance: 0 } },
                    loadingReport: false
                }
            },
            computed: { viewTitle() { const titles = { save: 'สะสมทรัพย์นักเรียน', deduct: 'หักลบกลบหนี้', manage: 'จัดการฐานข้อมูล', report: 'ออกรายงาน PDF', myMoney: 'เงินฉันมีเท่าไหร่' }; return titles[this.view]; } },
            beforeUnmount() { this.stopAutoRefresh(); },
            mounted() { if(this.view === 'report') this.fetchCustomReport(); },
            methods: {
                showToastMsg(msg, type = 'success') { this.toast = { show: true, msg, type }; },
                
                formatTimeRange(val) {
                    const map = { 'today':'วันนี้', 'week':'สัปดาห์นี้ (7 วันย้อนหลัง)', 'month':'เดือนปัจจุบัน', 'all':'ทั้งหมดตั้งแต่เริ่มระบบ' };
                    return map[val] || val;
                },

                refreshData() {
                    this.saveInfo = null; this.myMoneyInfo = null; this.students = [];
                    if(this.view === 'deduct') this.fetchStudentsByClass();
                    if(this.view === 'report') this.fetchCustomReport();
                },
                
                async changeView(newView) {
                    this.view = newView;
                    this.stopAutoRefresh(); 
                    if(newView === 'deduct') this.fetchStudentsByClass();
                    if(newView === 'manage') {
                        this.loadingHistory = true;
                        await this.fetchTransactions();
                        this.loadingHistory = false;
                        this.startAutoRefresh(); 
                    }
                    if(newView === 'report') this.fetchCustomReport();
                },

                startAutoRefresh() {
                    this.stopAutoRefresh();
                    this.autoRefreshTimer = setInterval(() => { if (this.view === 'manage') this.fetchTransactions(); }, 5000);
                },
                stopAutoRefresh() {
                    if (this.autoRefreshTimer) { clearInterval(this.autoRefreshTimer); this.autoRefreshTimer = null; }
                },

                handleSearchInput() {
                    clearTimeout(this.searchTimeout);
                    if (!this.saveId || this.saveId.trim() === '') { this.saveInfo = null; this.showSaveAnim = false; return; }
                    this.searchTimeout = setTimeout(() => { this.getStudent('save'); }, 500); 
                },

                clearSaveForm() {
                    this.saveId = ''; this.saveInfo = null; this.saveAmount = null; this.showSaveAnim = false; this.lastSlip = null;
                    this.$nextTick(() => { const input = document.getElementById('saveSearchInput'); if(input) input.focus(); });
                },

                async fetchStudentsByClass() {
                    try {
                        const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify({ action: 'getStudents', classLevel: this.selectedClass }) });
                        const data = await res.json();
                        if(data.status === 'success') this.students = data.data;
                    } catch(e) {}
                },
                
                async fetchTransactions() {
                    try {
                        const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify({ action: 'getTransactions' }) });
                        const data = await res.json();
                        if(data.status === 'success') this.transHistory = data.data;
                    } catch(e) {}
                },

                async deleteTransaction(row) {
                    if(!confirm("คุณแน่ใจที่จะลบและคืนยอดเงิน?")) return;
                    try {
                        const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify({ action: 'deleteTransaction', row: row }) });
                        const data = await res.json();
                        if(data.status === 'success') { this.showToastMsg("ลบข้อมูลสำเร็จ!"); this.fetchTransactions(); }
                    } catch(e) { this.showToastMsg("ลบล้มเหลว", "error"); }
                },
                
                selectAll(e) { this.selectedStudents = e.target.checked ? this.students.map(s => s.id) : []; },
                
                async getStudent(source) {
                    const id = source === 'save' ? this.saveId : this.myMoneyId;
                    if(!id) return;
                    this.loadingSearch = true; 
                    try {
                        const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify({ action: 'getStudent', id: id, classLevel: this.selectedClass }) });
                        const result = await res.json();
                        if(result.status === "success") {
                            if(source === 'save') {
                                this.saveInfo = result.data;
                                this.$nextTick(() => { const amtInput = document.getElementById('saveAmountInput'); if(amtInput) amtInput.focus(); });
                            }
                            if(source === 'myMoney') this.myMoneyInfo = result.data;
                        } else {
                            if(source === 'save') this.saveInfo = null;
                            if(source === 'myMoney') this.myMoneyInfo = null;
                        }
                    } catch (err) {}
                    this.loadingSearch = false; 
                },
                
                async submitTransaction(type) {
                    let payload;
                    if(type === 'save') {
                        if(!this.saveAmount || !this.saveInfo) return;
                        this.loadingSave = true;
                        payload = { action: 'transaction', studentId: this.saveInfo.id, type: 'save', amount: this.saveAmount, adminName: this.adminName };
                    } else if(type === 'deduct') {
                        if(!this.deductAmount || !this.transNote) { this.showToastMsg("กรุณากรอกข้อมูลให้ครบ", "error"); return; }
                        this.loadingDeduct = true;
                        if(this.deductMode === 'single') payload = { action: 'transaction', studentId: this.deductId, type: 'deduct', amount: this.deductAmount, date: this.transDate, note: this.transNote, adminName: this.adminName };
                        else {
                            if(this.selectedStudents.length === 0) { this.loadingDeduct = false; return; }
                            payload = { action: 'transactionGroup', studentIds: this.selectedStudents, type: 'deduct', amount: this.deductAmount, date: this.transDate, note: this.transNote, adminName: this.adminName };
                        }
                    } else if(type === 'manage') {
                        if(!this.manageAmount || !this.manageId) { this.showToastMsg("กรุณากรอก รหัส และ จำนวนเงิน", "error"); return; }
                        if(this.manageType === 'deduct' && (!this.manageNote || this.manageNote.trim() === '')) { this.showToastMsg("การหักเงิน ต้องระบุสาเหตุในช่องหมายเหตุเสมอ!", "error"); return; }
                        this.loadingManage = true;
                        let finalNote = this.manageNote;
                        if(this.manageType === 'save' && (!this.manageNote || this.manageNote.trim() === '')) { finalNote = "ฝากเงินย้อนหลัง"; }
                        payload = { action: 'transaction', studentId: this.manageId, type: this.manageType, amount: this.manageAmount, date: this.manageDate, note: finalNote, adminName: this.adminName };
                    }

                    try {
                        const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify(payload) });
                        const result = await res.json();
                        if(result.status === "success") {
                            if(type === 'save') {
                                this.lastSlip = {
                                    studentName: this.saveInfo.name, studentId: this.saveInfo.id, amount: this.saveAmount, adminName: this.adminName,
                                    date: new Date().toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' })
                                };
                                this.showSaveAnim = true; 
                            } else {
                                this.showToastMsg("ทำรายการสำเร็จ!");
                                if(type === 'deduct') { this.deductId = ''; this.deductAmount = null; this.selectedStudents = []; this.fetchStudentsByClass(); }
                                if(type === 'manage') { this.manageId = ''; this.manageAmount = null; this.manageNote = ''; this.fetchTransactions(); }
                            }
                        } else { this.showToastMsg(result.message, "error"); }
                    } catch (err) { this.showToastMsg("บันทึกล้มเหลว", "error"); }
                    this.loadingSave = false; this.loadingDeduct = false; this.loadingManage = false;
                },

                // 🌟 ฟังก์ชันดึงรายงาน PDF
                async fetchCustomReport() {
                    if (this.reportTargetMode === 'single' && !this.reportTargetId) {
                        this.reportData.history = [];
                        return;
                    }
                    this.loadingReport = true;
                    try {
                        const payload = { 
                            action: 'getCustomReport', classLevel: this.selectedClass, 
                            timeRange: this.reportTimeRange, targetMode: this.reportTargetMode, targetId: this.reportTargetId
                        };
                        const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify(payload) });
                        const result = await res.json();
                        if(result.status === 'success') { 
                            this.reportData = result.data; 
                        } 
                        else { 
                            // 💡 ถ้าพัง มันจะโชว์ Error จากหลังบ้านตรงๆ ให้เราเห็นเลยครับ
                            this.showToastMsg("Error หลังบ้าน: " + (result.message || "ไม่ทราบสาเหตุ"), "error"); 
                        }
                    } catch(e) { 
                        this.showToastMsg("ไม่สามารถเชื่อมต่อฐานข้อมูลได้ (ลิงก์ API ผิดหรือสิทธิ์เข้าถึงพัง)", "error"); 
                    }
                    this.loadingReport = false;
                },
                
                printReport() { 
                    if(this.reportTargetMode === 'single' && !this.reportTargetId) { this.showToastMsg("กรุณาระบุรหัสนักเรียนก่อนพิมพ์", "error"); return; }
                    window.print(); 
                }
            }
        }).mount('#app');
    </script>
